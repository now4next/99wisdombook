<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카카오 로그인 중...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5ede0;
      font-family: -apple-system, sans-serif;
      flex-direction: column;
      gap: 16px;
      color: #3e2820;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0c9a6;
      border-top-color: #3e2820;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 0.95em; color: #8d6e63; margin: 0; }
    .error { color: #c62828; font-size: 0.9em; text-align: center; max-width: 300px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>카카오 로그인 처리 중…</p>

  <script src="/api-client.js"></script>
  <script>
    (async function () {
      const REDIRECT_URI = 'https://99wisdombook.org/kakao-callback.html';
      const params = new URLSearchParams(window.location.search);
      const code  = params.get('code');
      const error = params.get('error');

      if (error || !code) {
        document.querySelector('p').textContent = '로그인이 취소되었습니다.';
        setTimeout(() => window.location.href = '/', 1500);
        return;
      }

      try {
        const result = await wisdomAPI.kakaoLogin(code, REDIRECT_URI);
        if (!result.success) throw new Error(result.error || '로그인 실패');
        window.location.href = result.user.role === 'admin' ? '/admin.html' : '/book.html';
      } catch (err) {
        document.querySelector('.spinner').style.display = 'none';
        document.querySelector('p').textContent = '';
        const div = document.createElement('div');
        div.className = 'error';
        div.textContent = err.message || '카카오 로그인에 실패했습니다. 다시 시도해주세요.';
        document.body.appendChild(div);
        const btn = document.createElement('button');
        btn.textContent = '돌아가기';
        btn.style.cssText = 'margin-top:12px;padding:10px 24px;background:#3e2820;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:0.9em;';
        btn.onclick = () => window.location.href = '/';
        document.body.appendChild(btn);
      }
    })();
  </script>
</body>
</html>
