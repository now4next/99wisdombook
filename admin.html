<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 캐시 무효화 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- 모든 브라우저 호환성 설정 -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#5d4037">
  <title>관리자 페이지 - 회원 관리</title>
  
  <!-- CRITICAL: Authentication check MUST come first -->
  <script>
    // Step 1: Check authentication BEFORE anything else
    (function() {
      console.log('[ADMIN HEAD] Starting early authentication check...');
      
      const currentUserStr = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
      console.log('[ADMIN HEAD] currentUser:', currentUserStr);
      
      if (!currentUserStr) {
        console.log('[ADMIN HEAD] ❌ No user logged in, redirecting to index');
        window.location.replace('index.html');
        return;
      }
      
      let currentUser;
      try {
        currentUser = JSON.parse(currentUserStr);
        console.log('[ADMIN HEAD] Parsed user:', currentUser.username, 'role:', currentUser.role);
      } catch (e) {
        console.error('[ADMIN HEAD] ❌ JSON parse error');
        window.location.replace('index.html');
        return;
      }
      
      if (currentUser.role !== 'admin') {
        console.log('[ADMIN HEAD] ❌ Not admin, redirecting to book');
        window.location.replace('book.html');
        return;
      }
      
      console.log('[ADMIN HEAD] ✅ Admin confirmed, proceeding with page load');
    })();
    
    // Step 2: Cache busting (only if auth passed)
    const currentVersion = '1770989497';
    const urlVersion = new URLSearchParams(window.location.search).get('v');
    if (urlVersion !== currentVersion) {
      console.log('[ADMIN HEAD] Updating version to', currentVersion);
      window.location.href = window.location.pathname + '?v=' + currentVersion;
    }
  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --font-sans: 'Noto Sans KR', sans-serif;
      --color-primary: #5d4037;
      --color-primary-light: #8d6e63;
      --color-bg: #f8f9fa;
      --color-white: #ffffff;
      --color-text: #212529;
      --color-text-secondary: #6c757d;
      --border-color: #dee2e6;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.12);
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      min-height: 100vh;
      color: var(--color-text);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      background: var(--color-white);
      padding: 24px 32px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--color-primary);
    }

    .logout-btn {
      background: var(--color-primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: var(--color-primary-light);
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
    }

    /* Stats Cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--color-white);
      padding: 24px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      text-align: center;
      transition: all 0.2s;
    }

    .stat-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .stat-card .number {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 8px;
    }

    .stat-card .label {
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      font-weight: 500;
    }

    /* Members Table */
    .table-container {
      background: var(--color-white);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color);
    }

    .table-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--color-text);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--color-bg);
      padding: 16px 24px;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border-color);
    }

    td {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tbody tr {
      transition: background 0.2s;
    }

    tbody tr:hover {
      background: #f8f9fa;
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .badge-admin {
      background: #fff3e0;
      color: #e65100;
    }

    .badge-user {
      background: #e8f5e9;
      color: #2e7d32;
    }

    /* Language Permissions */
    .permissions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .lang-badge {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      background: #e3f2fd;
      color: #1565c0;
      font-weight: 500;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
      font-family: var(--font-sans);
      display: inline-block;
    }

    .btn-edit {
      background: var(--color-primary);
      color: white;
      margin-right: 8px;
    }

    .btn-edit:hover {
      background: var(--color-primary-light);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(93, 64, 55, 0.3);
    }

    .btn-delete {
      background: #d32f2f;
      color: white;
    }

    .btn-delete:hover {
      background: #b71c1c;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(211, 47, 47, 0.3);
    }

    .btn-create {
      background: #2e7d32;
      color: white;
      padding: 10px 20px;
      margin-bottom: 20px;
    }

    .btn-create:hover {
      background: #1b5e20;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(46, 125, 50, 0.3);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border-color);
    }

    .modal-header h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--color-primary);
    }

    .modal-body {
      margin-bottom: 24px;
    }

    .user-info {
      background: var(--color-bg);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .user-info p {
      margin: 8px 0;
      font-size: 0.9rem;
    }

    .user-info strong {
      color: var(--color-primary);
      font-weight: 600;
    }

    .permission-section {
      margin-top: 20px;
    }

    .permission-section h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--color-text);
    }

    /* Role Selection */
    .role-section {
      background: var(--color-bg);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .role-section h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--color-text);
    }

    .role-options {
      display: flex;
      gap: 16px;
    }

    .role-option {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 12px;
      background: white;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .role-option:hover {
      border-color: var(--color-primary);
      background: #fafafa;
    }

    .role-option input[type="radio"] {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      cursor: pointer;
      accent-color: var(--color-primary);
    }

    .role-option label {
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      user-select: none;
    }

    .permission-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .permission-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background: var(--color-bg);
      border-radius: 8px;
      transition: all 0.2s;
    }

    .permission-item:hover {
      background: #e9ecef;
    }

    .permission-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      cursor: pointer;
      accent-color: var(--color-primary);
    }

    .permission-item label {
      cursor: pointer;
      font-size: 0.9rem;
      user-select: none;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn-save {
      background: var(--color-primary);
      color: white;
      padding: 12px 24px;
    }

    .btn-save:hover {
      background: var(--color-primary-light);
    }

    .btn-cancel {
      background: #e9ecef;
      color: var(--color-text);
      padding: 12px 24px;
    }

    .btn-cancel:hover {
      background: #dee2e6;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-secondary);
    }

    .empty-state p {
      font-size: 1.1rem;
      margin-top: 12px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .table-container {
        overflow-x: auto;
      }

      table {
        min-width: 800px;
      }

      .permission-grid {
        grid-template-columns: 1fr;
      }

      .role-options {
        flex-direction: column;
      }
    }
  </style>
  
  <!-- API Client -->
  <script src="/api-client.js"></script>
</head>
<body>

  <!-- Edit User Modal -->
  <div id="edit-modal" class="modal">

  <script>
    let currentEditUser = null;
    // Language code mappings - DB uses full names, UI uses short codes
    const langNames = {
      ko: '한국어',
      en: 'English',
      zh: '中文',
      ja: '日本語',
      es: 'Español',
      fr: 'Français',
      ru: 'Русский',
      ar: 'عربي',
      hi: 'हिन्दी',
      korean: '한국어',
      english: 'English',
      chinese: '中文',
      japanese: '日本語',
      spanish: 'Español',
      french: 'Français',
      russian: 'Русский',
      arabic: 'عربي',
      hindi: 'हिन्दी'
    };
    
    // Convert DB language codes to UI codes
    const dbToUiLang = {
      korean: 'ko',
      english: 'en',
      chinese: 'zh',
      japanese: 'ja',
      spanish: 'es',
      french: 'fr',
      russian: 'ru',
      arabic: 'ar',
      hindi: 'hi'
    };
    
    // Convert UI language codes to DB codes
    const uiToDbLang = {
      ko: 'korean',
      en: 'english',
      zh: 'chinese',
      ja: 'japanese',
      es: 'spanish',
      fr: 'french',
      ru: 'russian',
      ar: 'arabic',
      hi: 'hindi'
    };

    // Check admin authentication
    function checkAuth() {
      console.log('[ADMIN] ========================================');
      console.log('[ADMIN] Checking authentication...');
      
      // Check if logged in via API
      if (!wisdomAPI.isLoggedIn()) {
        console.log('[ADMIN] ❌ Not logged in');
        window.location.replace('index.html');
        return null;
      }
      
      const currentUser = wisdomAPI.getCurrentUser();
      console.log('[ADMIN] Current user:', currentUser);
      
      // Check if admin
      if (currentUser.role !== 'admin') {
        console.log('[ADMIN] ❌ User role is not admin:', currentUser.role);
        alert('관리자 권한이 필요합니다.');
        window.location.replace('book.html');
        return null;
      }
      
      console.log('[ADMIN] ✅ ✅ ✅ Authentication SUCCESSFUL ✅ ✅ ✅');
      console.log('[ADMIN] Admin:', currentUser.username, '/', currentUser.email);
      console.log('[ADMIN] ========================================');
      return currentUser;
    }

    // Load users and display
    async function loadUsers() {
      console.log('[ADMIN] Loading users from API...');
      console.log('[ADMIN] API token:', wisdomAPI.token);
      
      try {
        const result = await wisdomAPI.getUsers();
        console.log('[ADMIN] API response:', result);
        
        if (!result.success) {
          throw new Error(result.error || 'Failed to load users');
        }
        
        const users = result.users || [];
        console.log('[ADMIN] Loaded', users.length, 'users from API');
        
        const tbody = document.getElementById('user-table-body');
        
        if (!tbody) {
          console.error('[ADMIN] ERROR: table body element not found!');
          return;
        }
        
        // Update stats
        document.getElementById('total-users').textContent = users.length;
        document.getElementById('admin-count').textContent = users.filter(u => u.role === 'admin').length;
        document.getElementById('user-count').textContent = users.filter(u => u.role === 'user').length;
        
        // Clear table
        tbody.innerHTML = '';
        
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><p>등록된 회원이 없습니다.</p></td></tr>';
          return;
        }
        
        // Add users to table
        console.log('[ADMIN] Creating table rows for', users.length, 'users');
        
        users.forEach((user, index) => {
          console.log('[ADMIN] Processing user', index + 1, ':', user.username, user.email);
        
        const tr = document.createElement('tr');
        
        // Username
        const tdUsername = document.createElement('td');
        tdUsername.textContent = user.username || user.name;
        tr.appendChild(tdUsername);
        
        // Email
        const tdEmail = document.createElement('td');
        tdEmail.textContent = user.email;
        tr.appendChild(tdEmail);
        
        // Role
        const tdRole = document.createElement('td');
        const roleBadge = document.createElement('span');
        roleBadge.className = user.role === 'admin' ? 'badge badge-admin' : 'badge badge-user';
        roleBadge.textContent = user.role === 'admin' ? '관리자' : '일반 회원';
        tdRole.appendChild(roleBadge);
        tr.appendChild(tdRole);
        
        // Permissions
        const tdPermissions = document.createElement('td');
        const permDiv = document.createElement('div');
        permDiv.className = 'permissions';
        
        if (user.permissions && user.permissions.length > 0) {
          user.permissions.forEach(lang => {
            const langBadge = document.createElement('span');
            langBadge.className = 'lang-badge';
            langBadge.textContent = langNames[lang] || lang;
            permDiv.appendChild(langBadge);
          });
        } else {
          permDiv.textContent = '-';
        }
        
        tdPermissions.appendChild(permDiv);
        tr.appendChild(tdPermissions);
        
        // Created date
        const tdDate = document.createElement('td');
        try {
          // Handle both created_at (DB) and createdAt (old format)
          const dateStr = user.created_at || user.createdAt;
          const date = new Date(dateStr);
          if (isNaN(date.getTime())) {
            tdDate.textContent = '-';
          } else {
            tdDate.textContent = date.toLocaleDateString('ko-KR');
          }
        } catch (e) {
          tdDate.textContent = '-';
        }
        tr.appendChild(tdDate);
        
        // Actions
        const tdActions = document.createElement('td');
        const editBtn = document.createElement('button');
        editBtn.className = 'btn btn-edit';
        editBtn.textContent = '편집';
        editBtn.onclick = () => openEditModal(user);
        tdActions.appendChild(editBtn);
        
        // 관리자가 아닌 경우에만 삭제 버튼 표시
        if (user.role !== 'admin') {
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'btn btn-delete';
          deleteBtn.textContent = '삭제';
          deleteBtn.onclick = () => deleteUser(user);
          tdActions.appendChild(deleteBtn);
        }
        
        tr.appendChild(tdActions);
        
        tbody.appendChild(tr);
      });
      
      console.log('[ADMIN] ✓ Table loaded with', users.length, 'users');
      } catch (error) {
        console.error('[ADMIN] ❌ Failed to load users:', error);
        console.error('[ADMIN] Error details:', error.message, error.stack);
        
        const tbody = document.getElementById('user-table-body');
        if (tbody) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><p style="color: red;">⚠️ 사용자 목록을 불러오는데 실패했습니다.<br>' + error.message + '</p></td></tr>';
        }
      }
    }

    // Open edit modal
    function openEditModal(user) {
      currentEditUser = user;
      
      console.log('Opening edit modal for user:', user);
      
      // Display user info
      const userInfo = document.getElementById('modal-user-info');
      userInfo.innerHTML = `
        <p><strong>사용자명:</strong> ${user.username || user.name}</p>
        <p><strong>이메일:</strong> ${user.email}</p>
      `;
      
      // Set current role
      const roleRadio = document.getElementById(`role-${user.role}`);
      if (roleRadio) {
        roleRadio.checked = true;
      }
      
      // Set current permissions - handle both DB format (korean) and UI format (ko)
      ['ko', 'en', 'zh', 'ja', 'es', 'fr', 'ru', 'ar', 'hi'].forEach(lang => {
        const checkbox = document.getElementById(`perm-${lang}`);
        const dbLang = uiToDbLang[lang];
        checkbox.checked = user.permissions && (
          user.permissions.includes(lang) || 
          user.permissions.includes(dbLang)
        );
      });
      
      // Update modal title
      document.querySelector('.modal-header h2').textContent = '회원 권한 편집';
      
      // Show modal
      document.getElementById('edit-modal').classList.add('active');
    }

    // Close modal
    function closeModal() {
      document.getElementById('edit-modal').classList.remove('active');
      currentEditUser = null;
    }

    // Save permissions
    async function savePermissions() {
      if (!currentEditUser) return;
      
      console.log('[ADMIN] Saving permissions for user:', currentEditUser);
      
      // Check if creating new user
      if (currentEditUser._isNew) {
        const username = document.getElementById('new-username').value.trim();
        const email = document.getElementById('new-email').value.trim();
        const password = document.getElementById('new-password').value;
        
        // Validation
        if (!username || !email || !password) {
          alert('모든 필드를 입력해주세요.');
          return;
        }
        
        if (users.find(u => u.username === username)) {
          alert('이미 존재하는 사용자명입니다.');
          return;
        }
        
        if (users.find(u => u.email === email)) {
          alert('이미 등록된 이메일입니다.');
          return;
        }
        
        // Get selected role
        const selectedRole = document.querySelector('input[name="user-role"]:checked');
        const role = selectedRole ? selectedRole.value : 'user';
        
        // Get selected permissions
        const permissions = [];
        ['ko', 'en', 'zh', 'ja', 'es', 'fr', 'ru', 'ar', 'hi'].forEach(lang => {
          const checkbox = document.getElementById(`perm-${lang}`);
          if (checkbox.checked) {
            permissions.push(uiToDbLang[lang]); // Convert to DB format
          }
        });
        
        // Create new user
        const newUser = {
          username,
          name: username,
          email,
          password,
          role,
          permissions: role === 'admin' ? ['korean', 'english', 'chinese', 'japanese', 'spanish', 'french', 'russian', 'arabic', 'hindi'] : permissions,
          createdAt: new Date().toISOString(),
          permanent: true
        };
        
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));
        
        console.log('Created new user:', newUser);
        alert('새 회원이 생성되었습니다.');
      } else {
        // Update existing user
        // Get selected role
        const selectedRole = document.querySelector('input[name="user-role"]:checked');
        const newRole = selectedRole ? selectedRole.value : currentEditUser.role;
        
        // Get selected permissions (convert to DB format)
        const permissions = [];
        ['ko', 'en', 'zh', 'ja', 'es', 'fr', 'ru', 'ar', 'hi'].forEach(lang => {
          const checkbox = document.getElementById(`perm-${lang}`);
          if (checkbox.checked) {
            permissions.push(uiToDbLang[lang]); // Convert to DB format
          }
        });
        
        console.log('[ADMIN] Updating user:', currentEditUser.id);
        console.log('[ADMIN] New role:', newRole);
        console.log('[ADMIN] New permissions:', permissions);
        
        try {
          // Update via API
          const result = await wisdomAPI.updateUser(currentEditUser.id, {
            role: newRole,
            permissions: permissions
          });
          
          if (!result.success) {
            throw new Error(result.error || 'Failed to update user');
          }
          
          console.log('[ADMIN] ✓ User updated successfully');
          alert('회원 정보가 수정되었습니다.');
          closeModal();
          await loadUsers(); // Reload user list
        } catch (error) {
          console.error('[ADMIN] ❌ Failed to update user:', error);
          alert('회원 정보 수정에 실패했습니다: ' + error.message);
        }
      }
    }

    // 카카오 알림 테스트 발송
    async function testKakaoNotify() {
      const btn = document.getElementById('btn-kakao-test');
      const result = document.getElementById('kakao-test-result');
      btn.disabled = true;
      result.textContent = '발송 중...';
      result.style.color = '#666';
      try {
        const res = await fetch('/api/notify/kakao-test', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${wisdomAPI.token}` },
        });
        const data = await res.json();
        if (data.success) {
          result.textContent = `✅ 발송 완료! "${data.wisdom}"`;
          result.style.color = '#2e7d32';
        } else {
          result.textContent = `❌ 실패: ${data.error}`;
          result.style.color = '#c62828';
        }
      } catch (e) {
        result.textContent = `❌ 오류: ${e.message}`;
        result.style.color = '#c62828';
      } finally {
        btn.disabled = false;
      }
    }

    // Open create user modal
    function openCreateModal() {
      currentEditUser = { _isNew: true };
      
      // Clear user info
      const userInfo = document.getElementById('modal-user-info');
      userInfo.innerHTML = `
        <p style="color: #2e7d32; font-weight: 600;">새로운 회원을 생성합니다</p>
        <div class="form-group" style="margin-top: 15px;">
          <label>사용자명:</label>
          <input type="text" id="new-username" placeholder="사용자명 입력" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px;">
        </div>
        <div class="form-group" style="margin-top: 10px;">
          <label>이메일:</label>
          <input type="email" id="new-email" placeholder="이메일 입력" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px;">
        </div>
        <div class="form-group" style="margin-top: 10px;">
          <label>비밀번호:</label>
          <input type="password" id="new-password" placeholder="비밀번호 입력" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px;">
        </div>
      `;
      
      // Set default role to user
      document.getElementById('role-user').checked = true;
      
      // Clear all permissions
      ['ko', 'en', 'zh', 'ja', 'es', 'fr', 'ru', 'ar'].forEach(lang => {
        document.getElementById(`perm-${lang}`).checked = false;
      });
      // Default: Korean only
      document.getElementById('perm-ko').checked = true;
      
      // Update modal title
      document.querySelector('.modal-header h2').textContent = '새 회원 생성';
      
      // Show modal
      document.getElementById('edit-modal').classList.add('active');
    }

    // Delete user (관리자만 실행 가능)
    async function deleteUser(user) {
      if (user.role === 'admin') {
        alert('관리자 계정은 삭제할 수 없습니다.');
        return;
      }
      
      if (!confirm(`정말로 "${user.username}" 회원을 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) {
        return;
      }
      
      console.log('[ADMIN] Deleting user:', user.id, user.username);
      
      try {
        const result = await wisdomAPI.deleteUser(user.id);
        
        if (!result.success) {
          throw new Error(result.error || 'Failed to delete user');
        }
        
        console.log('[ADMIN] ✓ User deleted successfully');
        alert('회원이 삭제되었습니다.');
        await loadUsers(); // Reload user list
      } catch (error) {
        console.error('[ADMIN] ❌ Failed to delete user:', error);
        alert('회원 삭제에 실패했습니다: ' + error.message);
      }
    }

    // Logout
    function logout() {
      if (confirm('로그아웃하시겠습니까?')) {
        localStorage.removeItem('currentUser');
        sessionStorage.removeItem('currentUser');
        window.location.href = 'index.html';
      }
    }

    // 데이터 영구성 보장: 주기적으로 localStorage 확인 및 백업
    setInterval(() => {
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      if (users.length > 0) {
        // 백업 데이터 저장 (예비용)
        localStorage.setItem('users_backup', JSON.stringify(users));
        console.log('✅ User data backed up:', users.length, 'users');
      }
    }, 300000); // 5분마다 백업

    // Prevent navigation away
    window.addEventListener('beforeunload', function(e) {
      // Allow navigation
      return undefined;
    });

    // Initialize on page load
    console.log('[ADMIN] ========================================');
    console.log('[ADMIN] Admin page loading...');
    console.log('[ADMIN] ========================================');
    
    // Stop any potential redirect
    window.history.pushState(null, '', window.location.href);
    
    // Authenticate
    const admin = checkAuth();
    
    if (admin) {
      console.log('[ADMIN] ✓ Authentication successful');
      console.log('[ADMIN] Loading user data...');
      
      // Small delay to ensure DOM is ready
      setTimeout(() => {
        loadUsers();
      }, 100);
    } else {
      console.log('[ADMIN] ✗ Authentication failed');
    }

    // Close modal on outside click
    document.getElementById('edit-modal').addEventListener('click', (e) => {
      if (e.target.id === 'edit-modal') {
        closeModal();
      }
    });
  </script>
</body>
