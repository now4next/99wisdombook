<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4a332c">
  <title>내가 모은 지혜 · 99 Wisdom Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    [hidden] { display: none !important; }

    :root {
      --brown-dark:  #3e2820;
      --brown:       #5d4037;
      --brown-mid:   #7a5b4e;
      --brown-light: #8d6e63;
      --cream:       #fffaf2;
      --cream-warm:  #f5ede0;
      --text:        #2c2118;
      --text-muted:  #6b5246;
      --font-serif:  'Nanum Myeongjo', Georgia, serif;
      --font-sans:   'Noto Sans KR', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: #f0ebe4;
      min-height: 100dvh;
      padding: 0 0 48px;
      color: var(--text);
    }

    /* ── 헤더 ── */
    .top-bar {
      background: var(--brown-dark);
      color: #f5e9d8;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .top-bar-back {
      background: none;
      border: none;
      color: inherit;
      font-size: 1.2em;
      cursor: pointer;
      padding: 4px 8px 4px 0;
      opacity: 0.8;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .top-bar-back:hover { opacity: 1; }
    .top-bar-title {
      font-family: var(--font-serif);
      font-size: 1.15em;
      flex: 1;
    }
    .streak-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,243,224,0.15);
      border: 1px solid rgba(255,224,178,0.3);
      color: #ffe0b2;
      font-size: 0.82em;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
    }

    /* ── 메인 ── */
    .main {
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 16px 0;
    }

    .section-label {
      font-size: 0.78em;
      color: var(--brown-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 2.8em; margin-bottom: 16px; opacity: 0.5; }
    .empty-title {
      font-family: var(--font-serif);
      font-size: 1.2em;
      color: var(--brown-mid);
      margin-bottom: 8px;
    }
    .empty-desc { font-size: 0.9em; line-height: 1.7; }
    .btn-go-home {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      background: var(--brown-dark);
      color: #f5e9d8;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9em;
      transition: background 0.2s;
    }
    .btn-go-home:hover { background: var(--brown); }

    /* ── 카드 목록 ── */
    .wisdom-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .wisdom-item {
      background: var(--cream);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(62,40,32,0.08);
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: box-shadow 0.2s, transform 0.2s;
      position: relative;
    }
    .wisdom-item:hover {
      box-shadow: 0 4px 16px rgba(62,40,32,0.13);
      transform: translateY(-1px);
    }

    .item-chapter {
      font-size: 0.75em;
      color: var(--brown-light);
      letter-spacing: 0.1em;
    }

    .item-title {
      font-family: var(--font-serif);
      font-size: 1.18em;
      color: var(--brown-dark);
      line-height: 1.4;
      word-break: keep-all;
    }

    .item-date {
      font-size: 0.77em;
      color: #bbb;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-item-read {
      flex: 1;
      padding: 9px 12px;
      background: var(--brown-dark);
      color: #f5e9d8;
      border: none;
      border-radius: 7px;
      font-size: 0.85em;
      font-family: var(--font-sans);
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s;
    }
    .btn-item-read:hover { background: var(--brown); }

    .btn-item-remove {
      padding: 9px 14px;
      background: none;
      border: 1px solid #e0d0c0;
      color: #c0a080;
      border-radius: 7px;
      font-size: 0.85em;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-item-remove:hover {
      border-color: #c62828;
      color: #c62828;
      background: #fff5f5;
    }

    /* ── 소감 영역 ── */
    .item-memo {
      font-size: 0.86em;
      color: var(--brown-mid);
      line-height: 1.65;
      background: #faf3e8;
      border-left: 3px solid #d9b897;
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      margin-top: 2px;
      white-space: pre-wrap;
      word-break: keep-all;
    }
    .btn-memo {
      padding: 9px 12px;
      background: none;
      border: 1px solid #d9b897;
      color: var(--brown-mid);
      border-radius: 7px;
      font-size: 0.82em;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-memo:hover { background: #faf3e8; border-color: var(--brown-light); }
    .memo-edit-area {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .memo-textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px 12px;
      border: 1px solid #d9b897;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 0.88em;
      color: var(--text);
      background: #fffaf2;
      resize: vertical;
      outline: none;
      line-height: 1.6;
    }
    .memo-textarea:focus { border-color: var(--brown-light); box-shadow: 0 0 0 2px rgba(141,110,99,0.12); }
    .memo-char-count {
      font-size: 0.75em;
      color: #bbb;
      text-align: right;
      margin-top: -4px;
    }
    .memo-edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-memo-save {
      padding: 7px 18px;
      background: var(--brown-dark);
      color: #f5e9d8;
      border: none;
      border-radius: 7px;
      font-size: 0.84em;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-memo-save:hover { background: var(--brown); }
    .btn-memo-cancel {
      padding: 7px 14px;
      background: none;
      border: 1px solid #e0d0c0;
      color: #a08060;
      border-radius: 7px;
      font-size: 0.84em;
      font-family: var(--font-sans);
      cursor: pointer;
    }
    .btn-memo-cancel:hover { background: #f5ede0; }

    /* ── 공유 버튼 ── */
    .item-actions-sub {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .btn-item-share {
      padding: 9px 14px;
      background: none;
      border: 1px solid #b8ccda;
      color: #4a7a9b;
      border-radius: 7px;
      font-size: 0.85em;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-item-share:hover { background: #eef4f8; border-color: #4a7a9b; }

    /* ── 공유 바텀시트 ── */
    .share-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30,18,12,0.55);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 800;
    }
    .share-sheet {
      background: var(--cream);
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 36px;
      width: 100%;
      max-width: 560px;
      animation: slideUpSheet 0.25s ease;
    }
    @keyframes slideUpSheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .share-handle {
      width: 36px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .share-title {
      font-family: var(--font-serif);
      font-size: 1em;
      color: var(--brown-dark);
      margin-bottom: 10px;
    }
    .share-preview-box {
      background: #faf3e8;
      border-left: 3px solid #d9b897;
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.88em;
      color: var(--brown-mid);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: keep-all;
      max-height: 100px;
      overflow: hidden;
    }
    .share-options { display: flex; flex-direction: column; gap: 10px; }
    .share-opt-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      background: none;
      border: 1px solid #e8ddd2;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-family: var(--font-sans);
      transition: background 0.15s, border-color 0.15s;
    }
    .share-opt-btn:hover { background: #faf3e8; border-color: #c9b09a; }
    .share-opt-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3em;
      flex-shrink: 0;
    }
    .share-opt-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 0.9em;
      color: var(--text);
      font-weight: 500;
    }
    .share-opt-label small { font-size: 0.8em; color: var(--text-muted); font-weight: 400; }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 56px 24px;
      color: var(--text-muted);
      font-size: 0.9em;
    }
    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 2px solid #e0d0c0;
      border-top-color: var(--brown);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 스낵바 */
    .snackbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--brown-dark);
      color: #f5e9d8;
      padding: 11px 22px;
      border-radius: 8px;
      font-size: 0.88em;
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .snackbar.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 400px) {
      .top-bar { padding: 16px 16px; }
      .main { padding: 20px 12px 0; }
      .wisdom-item { padding: 16px 14px 14px; }
    }
  </style>
</head>
<body>

  <!-- 상단 바 -->
  <header class="top-bar">
    <a class="top-bar-back" href="index.html" aria-label="뒤로">←</a>
    <span class="top-bar-title">내가 모은 지혜</span>
    <span class="streak-pill" id="streak-pill" hidden>🔥 <span id="header-streak">0</span>일</span>
  </header>

  <main class="main">
    <p class="section-label" id="list-label">보관한 지혜</p>

    <!-- 로딩 -->
    <div class="loading" id="loading-state">
      <div class="spinner"></div><br>불러오는 중…
    </div>

    <!-- 빈 상태 -->
    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-icon">📚</div>
      <h2 class="empty-title">아직 보관한 지혜가 없습니다</h2>
      <p class="empty-desc">Daily Wisdom 카드를 열어<br>마음에 드는 문장을 보관해보세요.</p>
      <a class="btn-go-home" href="index.html">오늘의 한 문장 보러 가기</a>
    </div>

    <!-- 목록 -->
    <div class="wisdom-list" id="wisdom-list" hidden></div>
  </main>

  <!-- 스낵바 -->
  <div class="snackbar" id="snackbar"></div>

  <!-- 공유 바텀시트 -->
  <div class="share-overlay" id="share-overlay" hidden>
    <div class="share-sheet" onclick="event.stopPropagation()">
      <div class="share-handle"></div>
      <h3 class="share-title">공유하기</h3>
      <div class="share-preview-box" id="share-preview"></div>
      <div class="share-options">
        <button class="share-opt-btn" id="share-kakao-btn">
          <span class="share-opt-icon" style="background:#FEE500;">💬</span>
          <span class="share-opt-label">카카오톡으로 공유<small>지혜와 소감을 친구에게 전달</small></span>
        </button>
        <button class="share-opt-btn" id="share-copy-btn">
          <span class="share-opt-icon" style="background:#f0ebe4;">📋</span>
          <span class="share-opt-label">텍스트 복사<small>문장과 소감을 클립보드에 복사</small></span>
        </button>
        <button class="share-opt-btn" id="share-native-btn" style="display:none">
          <span class="share-opt-icon" style="background:#e8f5e9;">↗</span>
          <span class="share-opt-label">다른 앱으로 공유<small>메시지·메모 등에 공유</small></span>
        </button>
      </div>
    </div>
  </div>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
          integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
          crossorigin="anonymous"></script>
  <script src="/api-client.js"></script>
  <script>
    function getToken() {
      return localStorage.getItem('authToken') || sessionStorage.getItem('authToken') || '';
    }

    function showSnackbar(msg) {
      const el = document.getElementById('snackbar');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    function formatSavedDate(str) {
      if (!str) return '';
      const d = new Date(str);
      if (isNaN(d)) return '';
      return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. 보관`;
    }

    async function removeItem(chapterId, cardEl) {
      const token = getToken();
      try {
        const res = await fetch(`/api/wisdom/save/${chapterId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const data = await res.json();
        if (data.success) {
          cardEl.style.transition = 'opacity 0.3s, transform 0.3s';
          cardEl.style.opacity = '0';
          cardEl.style.transform = 'translateX(12px)';
          setTimeout(() => {
            cardEl.remove();
            const list = document.getElementById('wisdom-list');
            if (!list.children.length) {
              list.hidden = true;
              document.getElementById('empty-state').hidden = false;
              document.getElementById('list-label').textContent = '보관한 지혜';
            } else {
              document.getElementById('list-label').textContent =
                `보관한 지혜 · ${list.children.length}개`;
            }
          }, 300);
          showSnackbar('보관함에서 삭제했습니다.');
        }
      } catch(err) {
        showSnackbar('삭제 중 오류가 발생했습니다.');
      }
    }

    async function saveMemo(chapterId, memoText, cardEl) {
      const token = getToken();
      try {
        const res = await fetch(`/api/wisdom/save/${chapterId}/memo`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ memo: memoText }),
        });
        const data = await res.json();
        if (data.success) {
          // Update displayed memo
          let memoEl = cardEl.querySelector('.item-memo');
          if (memoText) {
            if (!memoEl) {
              memoEl = document.createElement('div');
              memoEl.className = 'item-memo';
              cardEl.querySelector('.item-date').after(memoEl);
            }
            memoEl.textContent = memoText;
          } else if (memoEl) {
            memoEl.remove();
          }
          // Update memo button label
          const btnMemo = cardEl.querySelector('.btn-memo');
          if (btnMemo) btnMemo.textContent = memoText ? '💬 소감 수정' : '💬 소감 남기기';
          showSnackbar(memoText ? '소감을 저장했습니다.' : '소감을 삭제했습니다.');
        } else {
          showSnackbar('저장에 실패했습니다.');
        }
      } catch(_) {
        showSnackbar('서버 연결을 확인해주세요.');
      }
    }

    function buildCard(item) {
      const el = document.createElement('div');
      el.className = 'wisdom-item';
      const hasMemo = item.memo && item.memo.trim();
      el.innerHTML = `
        <span class="item-chapter">제 ${item.chapter_id} 장</span>
        <h3 class="item-title">${item.title}</h3>
        <span class="item-date">${formatSavedDate(item.saved_at)}</span>
        ${hasMemo ? `<div class="item-memo">${item.memo.trim()}</div>` : ''}
        <div class="item-actions">
          <a class="btn-item-read" href="book.html#chapter-${item.chapter_id}">챕터 읽기 →</a>
          <button class="btn-item-share" type="button">📤 공유</button>
        </div>
        <div class="item-actions-sub">
          <button class="btn-memo" type="button">${hasMemo ? '💬 소감 수정' : '💬 소감 남기기'}</button>
          <button class="btn-item-remove" type="button">삭제</button>
        </div>
        <div class="memo-edit-area" hidden>
          <textarea class="memo-textarea" maxlength="300" placeholder="이 문장과 관련된 나만의 생각이나 경험을 기록해보세요…">${hasMemo ? item.memo.trim() : ''}</textarea>
          <div class="memo-char-count"><span class="memo-count-num">${hasMemo ? item.memo.trim().length : 0}</span>/300</div>
          <div class="memo-edit-actions">
            <button class="btn-memo-cancel" type="button">취소</button>
            <button class="btn-memo-save" type="button">저장</button>
          </div>
        </div>
      `;

      const editArea = el.querySelector('.memo-edit-area');
      const textarea = el.querySelector('.memo-textarea');
      const charNum = el.querySelector('.memo-count-num');
      const btnMemo = el.querySelector('.btn-memo');
      const btnSave = el.querySelector('.btn-memo-save');
      const btnCancel = el.querySelector('.btn-memo-cancel');
      const btnShare = el.querySelector('.btn-item-share');

      textarea.addEventListener('input', () => {
        charNum.textContent = textarea.value.length;
      });

      btnMemo.addEventListener('click', () => {
        editArea.hidden = false;
        textarea.focus();
        btnMemo.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });

      btnCancel.addEventListener('click', () => {
        editArea.hidden = true;
        const curMemo = el.querySelector('.item-memo');
        textarea.value = curMemo ? curMemo.textContent : '';
        charNum.textContent = textarea.value.length;
      });

      btnSave.addEventListener('click', async () => {
        btnSave.disabled = true;
        await saveMemo(item.chapter_id, textarea.value.trim(), el);
        editArea.hidden = true;
        btnSave.disabled = false;
      });

      btnShare.addEventListener('click', () => {
        // 현재 DOM에서 최신 소감 읽기 (수정 후 반영)
        const curMemoEl = el.querySelector('.item-memo');
        const curMemo = curMemoEl ? curMemoEl.textContent.trim() : '';
        openShareSheet({ title: item.title, chapter_id: item.chapter_id, memo: curMemo });
      });

      el.querySelector('.btn-item-remove').addEventListener('click', () => removeItem(item.chapter_id, el));
      return el;
    }

    // ── 공유 기능 ──
    let _shareItem = null;

    function openShareSheet(item) {
      _shareItem = item;
      const preview = document.getElementById('share-preview');
      if (item.memo) {
        preview.textContent = `"${item.title}"\n\n💭 ${item.memo}`;
      } else {
        preview.textContent = `"${item.title}"`;
      }
      // 네이티브 공유 가능 여부 확인
      document.getElementById('share-native-btn').style.display =
        navigator.share ? 'flex' : 'none';
      document.getElementById('share-overlay').hidden = false;
    }

    function closeShareSheet() {
      document.getElementById('share-overlay').hidden = true;
      _shareItem = null;
    }

    async function loadStreak() {
      try {
        const token = getToken();
        const u = wisdomAPI.getCurrentUser();
        if (!u) return;
        const count = u.streak_count || 0;
        if (count > 0) {
          document.getElementById('header-streak').textContent = count;
          document.getElementById('streak-pill').hidden = false;
        }
      } catch(_) {}
    }

    async function loadSaved() {
      const token = getToken();

      if (!token || !wisdomAPI.isLoggedIn()) {
        document.getElementById('loading-state').hidden = true;
        document.getElementById('empty-state').hidden = false;
        document.getElementById('empty-state').querySelector('.empty-desc').textContent =
          '로그인 후 보관한 지혜를 확인할 수 있습니다.';
        document.getElementById('empty-state').querySelector('a').textContent = '로그인하러 가기';
        return;
      }

      try {
        const res = await fetch('/api/wisdom/saved', {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const data = await res.json();
        document.getElementById('loading-state').hidden = true;

        const saved = data.saved || [];
        if (!saved.length) {
          document.getElementById('empty-state').hidden = false;
          return;
        }

        const list = document.getElementById('wisdom-list');
        list.hidden = false;
        document.getElementById('list-label').textContent = `보관한 지혜 · ${saved.length}개`;
        saved.forEach(item => list.appendChild(buildCard(item)));
      } catch(err) {
        document.getElementById('loading-state').hidden = true;
        document.getElementById('empty-state').hidden = false;
        document.getElementById('empty-state').querySelector('.empty-desc').textContent =
          '데이터를 불러오지 못했습니다.\n잠시 후 다시 시도해주세요.';
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadSaved();
      loadStreak();

      // Kakao 초기화
      if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
        Kakao.init('8f717ec6e0665cf2dcaf585f1afa8af7');
      }

      // 공유 오버레이 배경 클릭 시 닫기
      document.getElementById('share-overlay').addEventListener('click', (e) => {
        if (e.target === document.getElementById('share-overlay')) closeShareSheet();
      });

      // 카카오 공유
      document.getElementById('share-kakao-btn').addEventListener('click', () => {
        if (!_shareItem) return;
        const item = _shareItem;
        closeShareSheet();
        try {
          if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
            Kakao.init('8f717ec6e0665cf2dcaf585f1afa8af7');
          }
          const desc = item.memo
            ? `💭 "${item.memo}"\n\n99 Wisdom Book`
            : '99 Wisdom Book — 살아본 뒤에야 비로소 읽히는 문장들';
          Kakao.Share.sendDefault({
            objectType: 'feed',
            content: {
              title: `"${item.title}"`,
              description: desc,
              imageUrl: 'https://99wisdombook.org/og-image.png',
              link: {
                mobileWebUrl: 'https://99wisdombook.org/?autoopen=1',
                webUrl: 'https://99wisdombook.org/?autoopen=1',
              },
            },
            buttons: [{
              title: '지혜의 문장 읽기',
              link: {
                mobileWebUrl: 'https://99wisdombook.org/?autoopen=1',
                webUrl: 'https://99wisdombook.org/?autoopen=1',
              },
            }],
          });
        } catch(e) {
          showSnackbar('카카오 공유를 사용할 수 없습니다.');
        }
      });

      // 텍스트 복사
      document.getElementById('share-copy-btn').addEventListener('click', () => {
        if (!_shareItem) return;
        const item = _shareItem;
        closeShareSheet();
        const text = item.memo
          ? `"${item.title}"\n\n💭 나의 소감: ${item.memo}\n\n— 99 Wisdom Book (99wisdombook.org)`
          : `"${item.title}"\n\n— 99 Wisdom Book (99wisdombook.org)`;
        navigator.clipboard.writeText(text)
          .then(() => showSnackbar('클립보드에 복사했습니다 ✓'))
          .catch(() => showSnackbar('복사에 실패했습니다.'));
      });

      // 네이티브 공유 (Web Share API)
      document.getElementById('share-native-btn').addEventListener('click', async () => {
        if (!_shareItem) return;
        const item = _shareItem;
        closeShareSheet();
        const text = item.memo
          ? `"${item.title}"\n\n💭 나의 소감: ${item.memo}`
          : `"${item.title}"`;
        try {
          await navigator.share({
            title: '99 Wisdom Book',
            text,
            url: 'https://99wisdombook.org/?autoopen=1',
          });
        } catch(_) {}
      });
    });
  </script>
</body>
</html>
