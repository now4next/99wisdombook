<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4a332c">
  <title>내가 모은 지혜 · 99 Wisdom Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    [hidden] { display: none !important; }

    :root {
      --brown-dark:  #3e2820;
      --brown:       #5d4037;
      --brown-mid:   #7a5b4e;
      --brown-light: #8d6e63;
      --cream:       #fffaf2;
      --cream-warm:  #f5ede0;
      --text:        #2c2118;
      --text-muted:  #6b5246;
      --font-serif:  'Nanum Myeongjo', Georgia, serif;
      --font-sans:   'Noto Sans KR', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: #f0ebe4;
      min-height: 100dvh;
      padding: 0 0 48px;
      color: var(--text);
    }

    /* ── 헤더 ── */
    .top-bar {
      background: var(--brown-dark);
      color: #f5e9d8;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .top-bar-back {
      background: none;
      border: none;
      color: inherit;
      font-size: 1.2em;
      cursor: pointer;
      padding: 4px 8px 4px 0;
      opacity: 0.8;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .top-bar-back:hover { opacity: 1; }
    .top-bar-title {
      font-family: var(--font-serif);
      font-size: 1.15em;
      flex: 1;
    }
    .streak-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,243,224,0.15);
      border: 1px solid rgba(255,224,178,0.3);
      color: #ffe0b2;
      font-size: 0.82em;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
    }

    /* ── 메인 ── */
    .main {
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 16px 0;
    }

    .section-label {
      font-size: 0.78em;
      color: var(--brown-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 2.8em; margin-bottom: 16px; opacity: 0.5; }
    .empty-title {
      font-family: var(--font-serif);
      font-size: 1.2em;
      color: var(--brown-mid);
      margin-bottom: 8px;
    }
    .empty-desc { font-size: 0.9em; line-height: 1.7; }
    .btn-go-home {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      background: var(--brown-dark);
      color: #f5e9d8;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9em;
      transition: background 0.2s;
    }
    .btn-go-home:hover { background: var(--brown); }

    /* ── 카드 목록 ── */
    .wisdom-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .wisdom-item {
      background: var(--cream);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(62,40,32,0.08);
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: box-shadow 0.2s, transform 0.2s;
      position: relative;
    }
    .wisdom-item:hover {
      box-shadow: 0 4px 16px rgba(62,40,32,0.13);
      transform: translateY(-1px);
    }

    .item-chapter {
      font-size: 0.75em;
      color: var(--brown-light);
      letter-spacing: 0.1em;
    }

    .item-title {
      font-family: var(--font-serif);
      font-size: 1.18em;
      color: var(--brown-dark);
      line-height: 1.4;
      word-break: keep-all;
    }

    .item-date {
      font-size: 0.77em;
      color: #bbb;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-item-read {
      flex: 1;
      padding: 9px 12px;
      background: var(--brown-dark);
      color: #f5e9d8;
      border: none;
      border-radius: 7px;
      font-size: 0.85em;
      font-family: var(--font-sans);
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s;
    }
    .btn-item-read:hover { background: var(--brown); }

    .btn-item-remove {
      padding: 9px 14px;
      background: none;
      border: 1px solid #e0d0c0;
      color: #c0a080;
      border-radius: 7px;
      font-size: 0.85em;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-item-remove:hover {
      border-color: #c62828;
      color: #c62828;
      background: #fff5f5;
    }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 56px 24px;
      color: var(--text-muted);
      font-size: 0.9em;
    }
    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 2px solid #e0d0c0;
      border-top-color: var(--brown);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 스낵바 */
    .snackbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--brown-dark);
      color: #f5e9d8;
      padding: 11px 22px;
      border-radius: 8px;
      font-size: 0.88em;
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .snackbar.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 400px) {
      .top-bar { padding: 16px 16px; }
      .main { padding: 20px 12px 0; }
      .wisdom-item { padding: 16px 14px 14px; }
    }
  </style>
</head>
<body>

  <!-- 상단 바 -->
  <header class="top-bar">
    <a class="top-bar-back" href="index.html" aria-label="뒤로">←</a>
    <span class="top-bar-title">내가 모은 지혜</span>
    <span class="streak-pill" id="streak-pill" hidden>🔥 <span id="header-streak">0</span>일</span>
  </header>

  <main class="main">
    <p class="section-label" id="list-label">보관한 지혜</p>

    <!-- 로딩 -->
    <div class="loading" id="loading-state">
      <div class="spinner"></div><br>불러오는 중…
    </div>

    <!-- 빈 상태 -->
    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-icon">📚</div>
      <h2 class="empty-title">아직 보관한 지혜가 없습니다</h2>
      <p class="empty-desc">Daily Wisdom 카드를 열어<br>마음에 드는 문장을 보관해보세요.</p>
      <a class="btn-go-home" href="index.html">오늘의 한 문장 보러 가기</a>
    </div>

    <!-- 목록 -->
    <div class="wisdom-list" id="wisdom-list" hidden></div>
  </main>

  <!-- 스낵바 -->
  <div class="snackbar" id="snackbar"></div>

  <script src="/api-client.js"></script>
  <script>
    function getToken() {
      return localStorage.getItem('authToken') || sessionStorage.getItem('authToken') || '';
    }

    function showSnackbar(msg) {
      const el = document.getElementById('snackbar');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    function formatSavedDate(str) {
      if (!str) return '';
      const d = new Date(str);
      if (isNaN(d)) return '';
      return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. 보관`;
    }

    async function removeItem(chapterId, cardEl) {
      const token = getToken();
      try {
        const res = await fetch(`/api/wisdom/save/${chapterId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const data = await res.json();
        if (data.success) {
          cardEl.style.transition = 'opacity 0.3s, transform 0.3s';
          cardEl.style.opacity = '0';
          cardEl.style.transform = 'translateX(12px)';
          setTimeout(() => {
            cardEl.remove();
            const list = document.getElementById('wisdom-list');
            if (!list.children.length) {
              list.hidden = true;
              document.getElementById('empty-state').hidden = false;
              document.getElementById('list-label').textContent = '보관한 지혜';
            } else {
              document.getElementById('list-label').textContent =
                `보관한 지혜 · ${list.children.length}개`;
            }
          }, 300);
          showSnackbar('보관함에서 삭제했습니다.');
        }
      } catch(err) {
        showSnackbar('삭제 중 오류가 발생했습니다.');
      }
    }

    function buildCard(item) {
      const el = document.createElement('div');
      el.className = 'wisdom-item';
      el.innerHTML = `
        <span class="item-chapter">제 ${item.chapter_id} 장</span>
        <h3 class="item-title">${item.title}</h3>
        <span class="item-date">${formatSavedDate(item.saved_at)}</span>
        <div class="item-actions">
          <a class="btn-item-read" href="book.html#chapter-${item.chapter_id}">챕터 읽기 →</a>
          <button class="btn-item-remove" type="button">삭제</button>
        </div>
      `;
      el.querySelector('.btn-item-remove').addEventListener('click', () => removeItem(item.chapter_id, el));
      return el;
    }

    async function loadStreak() {
      try {
        const token = getToken();
        const u = wisdomAPI.getCurrentUser();
        if (!u) return;
        const count = u.streak_count || 0;
        if (count > 0) {
          document.getElementById('header-streak').textContent = count;
          document.getElementById('streak-pill').hidden = false;
        }
      } catch(_) {}
    }

    async function loadSaved() {
      const token = getToken();

      if (!token || !wisdomAPI.isLoggedIn()) {
        document.getElementById('loading-state').hidden = true;
        document.getElementById('empty-state').hidden = false;
        document.getElementById('empty-state').querySelector('.empty-desc').textContent =
          '로그인 후 보관한 지혜를 확인할 수 있습니다.';
        document.getElementById('empty-state').querySelector('a').textContent = '로그인하러 가기';
        return;
      }

      try {
        const res = await fetch('/api/wisdom/saved', {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const data = await res.json();
        document.getElementById('loading-state').hidden = true;

        const saved = data.saved || [];
        if (!saved.length) {
          document.getElementById('empty-state').hidden = false;
          return;
        }

        const list = document.getElementById('wisdom-list');
        list.hidden = false;
        document.getElementById('list-label').textContent = `보관한 지혜 · ${saved.length}개`;
        saved.forEach(item => list.appendChild(buildCard(item)));
      } catch(err) {
        document.getElementById('loading-state').hidden = true;
        document.getElementById('empty-state').hidden = false;
        document.getElementById('empty-state').querySelector('.empty-desc').textContent =
          '데이터를 불러오지 못했습니다.\n잠시 후 다시 시도해주세요.';
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadSaved();
      loadStreak();
    });
  </script>
</body>
</html>
